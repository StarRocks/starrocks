// limitations under the License."""

[parse]
parse_deps = false

[export]
prefix = ""
exclude = ["sr_random_access_read"]

[enum]
# `enum class` already scopes variants on the C++ side, so we don't need
# the prefix dance. Variants render as `ValueTag::Ptr`, etc.
prefix_with_name = false
derive_helper_methods = false
