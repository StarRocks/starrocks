# cargo-deny config for tantivy-binding.
#
# Enforces that no crate in the dependency tree replaces the Rust global
# allocator — the binding crate pins `std::alloc::System` so allocations
# route through libc malloc, which BE's mem_hook.cpp aliases to my_malloc /
# my_free for MemTracker accounting. Adding jemallocator (or similar) would
# silently break that integration and BE OOM tracking would diverge from
# reality.
#
# Run from inside this directory:
#   cargo deny check bans
#
# CI must run this before any `cargo build` accepts a PR.

[bans]
multiple-versions = "allow"
wildcards = "allow"
deny = [
    { name = "jemallocator" },
    { name = "jemalloc-sys" },
    { name = "tikv-jemallocator" },
    { name = "tikv-jemalloc-sys" },
    { name = "mimalloc" },
    { name = "mimalloc-sys" },
    { name = "snmalloc-rs" },
    { name = "snmalloc-sys" },
]

[licenses]
# Keep license enforcement out of scope for this crate; tantivy itself is MIT
# and we already pin transitive deps via Cargo.lock.
unlicensed = "allow"
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-3-Clause", "ISC", "Zlib", "MPL-2.0", "Unicode-DFS-2016", "Unicode-3.0", "CC0-1.0", "BSL-1.0"]
