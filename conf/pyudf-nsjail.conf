# nsjail configuration for the Python UDF worker: full Linux-namespace isolation.
#
# This is the policy used when python_udf_sandbox=nsjail and namespace isolation
# is available (rootless via an unprivileged user namespace; for the privileged
# mode the BE adds --disable_clone_newuser on the command line).
#
# The BE renders the {{...}} placeholders at startup with the deployment paths:
#   {{PYTHON_HOME}} - the python env home (config python_envs), e.g. /usr
#   {{PYPKGS}}      - the directory holding flight_server.py (lib/py-packages)
#   {{SOCKET_DIR}}  - the worker unix-socket directory (local_library_dir/pyworker)
#   {{CONF}}        - this config file's directory (holds pyudf.kafel)
# Everything else below is static policy that operators may edit freely.

name: "pyudf-worker"
mode: ONCE
hostname: "pyudf"
cwd: "/"

clone_newuser: true
clone_newns: true
clone_newnet: true
# Do not bring up the loopback interface: the worker only serves over a unix
# socket, and bringing lo up needs CAP_NET_ADMIN (absent in the privileged mode).
# An empty network namespace already blocks all external egress.
iface_no_lo: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true
mount_proc: false
keep_caps: false

# Map the worker to an unprivileged uid inside the jail.
uidmap { inside_id: "65534" outside_id: "" count: 1 }
gidmap { inside_id: "65534" outside_id: "" count: 1 }

# Read-only view of the runtime (interpreter, stdlib, pyarrow, loader).
mount { src: "/lib"   dst: "/lib"   is_bind: true mandatory: false }
mount { src: "/lib64" dst: "/lib64" is_bind: true mandatory: false }
mount { src: "/bin"   dst: "/bin"   is_bind: true mandatory: false }
mount { src: "{{PYTHON_HOME}}" dst: "{{PYTHON_HOME}}" is_bind: true }
mount { src: "{{PYPKGS}}" dst: "{{PYPKGS}}" is_bind: true mandatory: false }

# Writable scratch and the worker unix-socket directory (BE connects at the
# same path). No /etc is bound, so secrets like /etc/shadow are not visible.
mount { dst: "/tmp" fstype: "tmpfs" rw: true options: "size=33554432" }
mount { src: "{{SOCKET_DIR}}" dst: "{{SOCKET_DIR}}" is_bind: true rw: true }

envar: "PYTHONHOME={{PYTHON_HOME}}"
envar: "PYTHONDONTWRITEBYTECODE=1"

# Address-space limit. nsjail's default (4096 MiB) is enough for pyarrow/gRPC;
# a much lower value breaks worker startup. Prefer cgroup limits for real memory
# capping. Raise here if UDFs need more virtual address space.
rlimit_as_type: VALUE
rlimit_as: 4096

# Syscall filter (kafel). See pyudf.kafel in this directory.
seccomp_policy_file: "{{CONF}}/pyudf.kafel"
