# nsjail configuration for the Python UDF worker: seccomp-only (no namespaces).
#
# This is the policy used for python_udf_sandbox=seccomp, and the automatic
# fallback when python_udf_sandbox=nsjail but no unprivileged user namespace or
# CAP_SYS_ADMIN is available. It needs no privileges and works in any container.
#
# Only a syscall filter (and rlimit) is applied; there is NO filesystem or
# network isolation here (the worker runs in the host namespaces). Rely on the
# container's own NetworkPolicy / limits, or add Landlock, for those.
#
# The BE renders {{PYTHON_HOME}} and {{CONF}} at startup (see pyudf-nsjail.conf).

name: "pyudf-worker-seccomp"
mode: ONCE
cwd: "/"

clone_newuser: false
clone_newns: false
clone_newnet: false
clone_newpid: false
clone_newipc: false
clone_newuts: false
clone_newcgroup: false
mount_proc: false
keep_caps: false

envar: "PYTHONHOME={{PYTHON_HOME}}"
envar: "PYTHONDONTWRITEBYTECODE=1"

rlimit_as_type: VALUE
rlimit_as: 4096

seccomp_policy_file: "{{CONF}}/pyudf.kafel"
