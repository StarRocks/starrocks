name: CI - Clang Format Auto Fix

on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize]
    # Only trigger when backend C/C++ source files are touched.
    paths:
      - 'be/src/**'
      - 'be/test/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret
        run: |
          if [ -z "${{ secrets.PAT }}" ]; then
            echo "SECRET IS EMPTY"
          else
            echo "SECRET IS SET"
          fi