name: WEEKLY UNSTABLE CASE REVIEW

# Runs every Monday to re-execute blacklisted unstable cases.
# Cases that now pass are auto-removed from unstable_case.json.
# Still-failing cases get AI analysis in an HTML report uploaded to OSS.

on:
  schedule:
    - cron: '0 2 * * 1'     # Every Monday 02:00 UTC
  workflow_dispatch:
    inputs:
      case_types:
        description: >
          Case types to review.
          Comma-separated: FE-UT, BE-UT, SQL-Tester, TIMEOUT, or "all".
        required: false
        default: 'all'
        type: string
      branch:
        description: 'Branch to review (default: main)'
        required: false
        default: 'main'
        type: string

permissions:
  checks: write
  actions: write
  contents: write
  pull-requests: write

env:
  IS_INSPECTION: 'true'
  SHARE_PATH: /var/local/env

jobs:
  # ─── Info / gate ─────────────────────────────────────────────────────────
  prepare:
    name: PREPARE
    runs-on: [self-hosted, normal]
    outputs:
      BRANCH:          ${{ steps.info.outputs.BRANCH }}
      COMMIT_SHA:      ${{ steps.info.outputs.COMMIT_SHA }}
      RUN_FE_UT:       ${{ steps.info.outputs.RUN_FE_UT }}
      RUN_BE_UT:       ${{ steps.info.outputs.RUN_BE_UT }}
      RUN_SQL_TESTER:  ${{ steps.info.outputs.RUN_SQL_TESTER }}
      CASE_SUMMARY:    ${{ steps.info.outputs.CASE_SUMMARY }}
    steps:
      - name: Setup
        id: info
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull >/dev/null

          BRANCH="${{ inputs.branch || 'main' }}"
          CASE_TYPES="${{ inputs.case_types || 'all' }}"

          COMMIT_SHA=$(gh api /repos/${REPO}/branches/${BRANCH} | jq -r .commit.sha)
          [[ "${COMMIT_SHA}" == "null" ]] && (echo "::error::Failed to get HEAD SHA for ${BRANCH}" && exit 1)

          echo "Branch: ${BRANCH}  SHA: ${COMMIT_SHA:0:8}  Types: ${CASE_TYPES}"
          echo "BRANCH=${BRANCH}"         >> $GITHUB_OUTPUT
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_OUTPUT

          python3 bin/review-unstable-cases.py prepare \
            --json files/unstable_case.json \
            --branch "${BRANCH}" \
            --case-types "${CASE_TYPES}"

  # ─── FE-UT (includes TIMEOUT cases with #) ───────────────────────────────
  fe-ut-review:
    name: FE-UT REVIEW
    needs: prepare
    if: ${{ needs.prepare.outputs.RUN_FE_UT == 'true' }}
    runs-on: [self-hosted, normal]
    env:
      BRANCH:      ${{ needs.prepare.outputs.BRANCH }}
      COMMIT_SHA:  ${{ needs.prepare.outputs.COMMIT_SHA }}
    outputs:
      oss_path: ${{ steps.run_ut.outputs.oss_path }}
    steps:
      - name: Run FE-UT (targeted unstable cases only)
        id: run_ut
        timeout-minutes: 180
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull >/dev/null && source lib/init.sh
          ./bin/elastic-ut-review.sh \
            --repository ${{ github.repository }} \
            --branch ${BRANCH} \
            --commit ${COMMIT_SHA} \
            --module fe \
            --linuxdistro ubuntu

      - name: Clean ECI
        if: always() && steps.run_ut.outputs.ECI_ID != ''
        run: eci rm ${{ steps.run_ut.outputs.ECI_ID }} || true

      - name: Clean ENV
        if: always()
        run: |
          rm -f  "${{ steps.run_ut.outputs.RES_FILE }}"  || true
          rm -f  "${{ steps.run_ut.outputs.RES_LOG }}"   || true
          rm -rf "${{ steps.run_ut.outputs.FE_REPORT_DIR }}" || true
          rm -rf ${{ github.workspace }}/*

  # ─── BE-UT ───────────────────────────────────────────────────────────────
  be-ut-review:
    name: BE-UT REVIEW
    needs: prepare
    if: ${{ needs.prepare.outputs.RUN_BE_UT == 'true' }}
    runs-on: [self-hosted, normal]
    env:
      BRANCH:      ${{ needs.prepare.outputs.BRANCH }}
      COMMIT_SHA:  ${{ needs.prepare.outputs.COMMIT_SHA }}
    outputs:
      oss_path: ${{ steps.run_ut.outputs.oss_path }}
    steps:
      - name: Run BE-UT (targeted unstable cases only)
        id: run_ut
        timeout-minutes: 240
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull >/dev/null && source lib/init.sh
          ./bin/elastic-ut-review.sh \
            --repository ${{ github.repository }} \
            --branch ${BRANCH} \
            --commit ${COMMIT_SHA} \
            --module be \
            --linuxdistro ubuntu

      - name: Clean ECI
        if: always() && steps.run_ut.outputs.ECI_ID != ''
        run: eci rm ${{ steps.run_ut.outputs.ECI_ID }} || true

      - name: Clean ENV
        if: always()
        run: |
          rm -f  "${{ steps.run_ut.outputs.RES_FILE }}"  || true
          rm -f  "${{ steps.run_ut.outputs.RES_LOG }}"   || true
          rm -rf ${{ github.workspace }}/*

  # ─── Deploy SR + SQL-Tester + Teardown (single job, same runner) ─────────
  sql-tester-review:
    name: SQL-TESTER REVIEW
    needs: prepare
    if: ${{ needs.prepare.outputs.RUN_SQL_TESTER == 'true' }}
    runs-on: [self-hosted, normal]
    env:
      BRANCH:        ${{ needs.prepare.outputs.BRANCH }}
      PR_NUMBER:     ${{ needs.prepare.outputs.COMMIT_SHA }}
      WEEKLY_REVIEW: 'true'
      LINUX_DISTRO:  ubuntu
      BUILD_TYPE:    Release
    outputs:
      sql_oss_path: ${{ steps.run.outputs.sql_oss_path }}
    steps:
      - name: Clean Workspace
        run: rm -rf ${{ github.workspace }} && mkdir -p ${{ github.workspace }}

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target branch and commit
        run: |
          git checkout ${BRANCH}
          git reset ${PR_NUMBER} --hard

      - name: Apply for ECS & Deploy SR
        id: deploy
        timeout-minutes: 30
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull >/dev/null && source lib/init.sh
          ./bin/elastic-cluster.sh --template ci-admit --linuxdistro ubuntu
          _oss="/var/local/env/ossutil64 --config-file /root/.ossutilconfig"
          _base="oss://starrocks-ci-release/${BRANCH}/Release/inspection/pr/ubuntu"
          # Sort by modification time (line starts with date), take latest BE to get the commit SHA
          LATEST_SHA=$(${_oss} ls "${_base}/" | grep "\-BE\.tar\.gz" | sort -r | head -1 | awk '{print $NF}' | grep -oE '[a-f0-9]{40}')
          [[ -z "${LATEST_SHA}" ]] && echo "::error::No inspection package found for branch ${BRANCH}" && exit 1
          SHORT_SHA=${LATEST_SHA:0:7}
          BE_OUTPUT_TAR="${_base}/${LATEST_SHA}/be/StarRocks-${SHORT_SHA}-BE.tar.gz"
          FE_OUTPUT_TAR="${_base}/${LATEST_SHA}/fe/StarRocks-${SHORT_SHA}-FE.tar.gz"
          echo "Inspection commit: ${LATEST_SHA}"
          echo "BE: ${BE_OUTPUT_TAR}"
          echo "FE: ${FE_OUTPUT_TAR}"
          export BE_OUTPUT_TAR FE_OUTPUT_TAR LINUX_DISTRO=ubuntu
          ./bin/deploy-cluster.sh -c ci-admit

      - name: Run SQL-Tester (inspection mode)
        id: run
        if: steps.deploy.outcome == 'success'
        timeout-minutes: 360
        env:
          FE_NODE:      ${{ steps.deploy.outputs.fe }}
          BE_NODE:      ${{ steps.deploy.outputs.be }}
          CLUSTER_NAME: ci-admit
        run: |
          cd ci-tool && source lib/init.sh

          # Compute the OSS path used by run-sql-tester.sh in IS_INSPECTION mode
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BUCKET="${owner}-ci-release"
          SQL_OSS="oss://${BUCKET}/inspection/${PR_NUMBER}/sql-tester/Release/ubuntu/native"
          echo "sql_oss_path=${SQL_OSS}" >> $GITHUB_OUTPUT

          ./bin/run-sql-tester.sh

      - name: Backup logs
        if: always()
        run: |
          cd ci-tool && source lib/init.sh
          ./bin/backup_log_cores.sh || true

      - name: Clean MySQL ECI
        if: always() && steps.run.outputs.MYSQL_ECI_ID != ''
        run: eci rm ${{ steps.run.outputs.MYSQL_ECI_ID }} || true

      - name: Delete ECS cluster
        if: always()
        run: |
          cd ci-tool && source lib/init.sh
          ./bin/elastic-cluster.sh --delete || true

      - name: Clean ENV
        if: always()
        run: rm -rf ${{ github.workspace }}/*

  # ─── Generate report & update JSON ───────────────────────────────────────
  report:
    name: REPORT
    needs: [prepare, fe-ut-review, be-ut-review, sql-tester-review]
    if: always() && needs.prepare.result == 'success'
    runs-on: [self-hosted, normal]
    env:
      BRANCH:              ${{ needs.prepare.outputs.BRANCH }}
      COMMIT_SHA:          ${{ needs.prepare.outputs.COMMIT_SHA }}
      ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Generate report & update unstable_case.json
        id: gen
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull >/dev/null && source lib/init.sh

          CASE_TYPES="${{ inputs.case_types || 'all' }}"
          FE_OSS="${{ needs.fe-ut-review.outputs.oss_path }}"
          BE_OSS="${{ needs.be-ut-review.outputs.oss_path }}"
          SQL_OSS="${{ needs.sql-tester-review.outputs.sql_oss_path }}"
          WORK_DIR="/tmp/unstable-review-${GITHUB_RUN_ID}"

          python3 bin/review-unstable-cases.py report \
            --json     files/unstable_case.json \
            --branch   "${BRANCH}" \
            --commit   "${COMMIT_SHA}" \
            --case-types "${CASE_TYPES}" \
            --fe-oss-path  "${FE_OSS}"  \
            --be-oss-path  "${BE_OSS}"  \
            --sql-oss-path "${SQL_OSS}" \
            --output-dir "${WORK_DIR}"

          echo "WORK_DIR=${WORK_DIR}" >> $GITHUB_OUTPUT

      - name: Publish test results (Checks tab)
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: "${{ steps.gen.outputs.JUNIT_PATH }}"
          check_name: 'Unstable Case Review'
          fail_on_failure: false
          detailed_summary: true
          include_passed: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload report to OSS
        id: upload
        run: |
          WORK_DIR="${{ steps.gen.outputs.WORK_DIR }}"
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          [[ "$owner" == "starrocks" ]] && bucket="starrocks-ci-release" || bucket="${owner}-ci-release"
          REPORT_OSS="oss://${bucket}/unstable-case-review/${BRANCH}/${COMMIT_SHA:0:8}/"
          /var/local/env/ossutil64 --config-file /root/.ossutilconfig \
            cp "${WORK_DIR}/report.html" "${REPORT_OSS}report.html" -f
          echo "REPORT_URL=${REPORT_OSS}report.html" >> $GITHUB_OUTPUT

      - name: Open PR with updated unstable_case.json
        # Temporarily disabled: secrets.SYNC_PAT is not configured on
        # this repo (the `SYNC_PAT` name lives in celerdata-enterprise),
        # so `gh pr create` runs with an empty GH_TOKEN and fails. Also
        # /var/lib/ci-tool is a shared dirty working tree on the runner.
        # Re-enable after a working PAT is wired in and a clean-checkout
        # safeguard is added to the step.
        if: false
        id: open_pr
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          cd ci-tool
          git config user.name  "wanpengfei-git"
          git config user.email "wanpengfei91@163.com"

          # Skip if review didn't touch the file (no stable cases this run)
          if git diff --quiet files/unstable_case.json; then
            echo "No changes to unstable_case.json — skipping PR"
            echo "pr_url=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Include GITHUB_RUN_ID so reruns of the same workflow (same date,
          # same commit) get a fresh head branch instead of colliding with a
          # previous attempt's branch / PR.
          BR="auto/weekly-review-cleanup-$(date +%Y-%m-%d)-${COMMIT_SHA:0:8}-r${GITHUB_RUN_ID}"
          git checkout -b "$BR"
          git add files/unstable_case.json
          git commit -m "[Tool] weekly review cleanup ${BRANCH} ${COMMIT_SHA:0:8} (auto)"
          git push origin "$BR"

          # YAML's run: | block strips the common indent, so the heredoc body and EOF
          # end up at column 0 from bash's perspective — no further sed/dedent needed.
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" <<EOF
          Auto-generated by [weekly review run #${GITHUB_RUN_ID}](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}).

          This PR removes cases that passed all 3 rounds of the weekly review and are now considered stable.

          Please sanity-check the diff before merging — pay attention to any cases with a high \`add_count\` (yo-yo counter) that might be temporarily passing.
          EOF

          PR_URL=$(gh pr create \
            --repo StarRocks/ci-tool \
            --base main \
            --head "$BR" \
            --title "[Tool] weekly review cleanup $(date +%Y-%m-%d) (auto)" \
            --body-file "$BODY_FILE")
          rm -f "$BODY_FILE"
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT
          echo "Opened PR: ${PR_URL}"

      - name: Notify int-cd-rd-ci Slack channel
        if: steps.open_pr.outputs.pr_url != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          # Jackie Liu's Slack ID lives in ci-tool/conf/member_slack.json under his GitHub login
          REVIEWER_LOGIN="huailiu1122"
          REVIEWER_SLACK_ID=$(jq -r --arg login "$REVIEWER_LOGIN" '.[$login] // empty' ci-tool/conf/member_slack.json)

          PR_URL="${{ steps.open_pr.outputs.pr_url }}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          CHANNEL_ID="C0APHDFLAQ7"   # int-cd-rd-ci

          if [[ -n "$REVIEWER_SLACK_ID" ]]; then
            MENTION="<@${REVIEWER_SLACK_ID}>"
          else
            # Fallback: tag by GitHub handle so the message is still actionable
            MENTION="@${REVIEWER_LOGIN}"
          fi

          MSG=$(printf ':robot_face: Weekly unstable-case review cleanup ready for confirmation:\n• Run: %s\n• PR:  %s\n\n%s please review and merge.' "$RUN_URL" "$PR_URL" "$MENTION")

          # Reuse ci-tool's slack_notify.py (--mode channel) instead of inlining
          # curl; keeps the Slack-API wire format in one place (lib/slack_lib.py).
          python3 ci-tool/lib/slack_notify.py \
            --mode channel \
            --token "${SLACK_BOT_TOKEN}" \
            --channel "${CHANNEL_ID}" \
            --text "${MSG}"

      - name: Clean ENV
        if: always()
        run: |
          rm -rf "${{ steps.gen.outputs.WORK_DIR }}" || true
          rm -rf ${{ github.workspace }}/*
