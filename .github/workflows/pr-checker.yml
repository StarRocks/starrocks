name: PR CHECKER

on:
  pull_request_target:
    branches:
      - main
      - "branch*"

    types:
      - opened
      - reopened
      - edited
      - synchronize

concurrency:
  group: PR-CHECKER-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  checks: write
  actions: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  sync-checker:
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.pull_request.title, '(sync #') &&
      !contains(github.event.pull_request.labels.*.name, 'sync') &&
      (!startsWith(github.head_ref, github.base_ref) || !contains(github.head_ref, '-sync-'))
    name: SYNC CHECKER
    outputs:
      BACKPORT_SOURCE_PR: ${{ steps.backport_assign.outputs.ORI_PR }}
    steps:
      - run: echo "Normal PR."

      - name: backport assign
        id: backport_assign
        if: startsWith(github.head_ref, 'mergify/bp/') && github.event.action == 'opened'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          ORI_PR=$(echo "${PR_TITLE}" | grep -oP '\(backport #\K\d+' | tail -n 1)
          author=$(gh pr view ${ORI_PR} -R ${REPO} --json author -q '.author.login')
          if [[ ! "${author}" =~ "mergify" ]]; then
            gh pr edit ${PR_NUMBER} -R ${REPO} --add-assignee ${author} || true
            echo "ORI_PR=${ORI_PR}" >> $GITHUB_OUTPUT
          fi

  title-check:
    runs-on: ubuntu-latest
    needs: sync-checker
    if: >
      !startsWith(github.event.pull_request.title, 'Revert ')
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.number }}
      REPO: ${{ github.repository }}
      BACKPORT_SOURCE_PR: ${{ needs.sync-checker.outputs.BACKPORT_SOURCE_PR }}
    steps:
      - uses: thehanimo/pr-title-checker@v1.3.5
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          pass_on_octokit_error: false
          configuration_path: ".github/pr-title-checker-config.json"

      - name: update body
        if: always() && github.base_ref != 'main' && (github.event.action == 'opened' || github.event.action == 'reopened')
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh pr view ${PR_NUMBER} -R ${REPO} --json body -q .body > body.txt
          ori_body=$(cat body.txt)

          if [[ "${GITHUB_HEAD_REF}" == "mergify/bp/"* && "${BACKPORT_SOURCE_PR}" != "" ]]; then
            gh pr view ${BACKPORT_SOURCE_PR} -R ${REPO} --json body -q .body > source_body.txt
            if grep -q 'Bugfix cherry-pick branch check'; then
              sed -ie '/Bugfix cherry-pick branch check/,$d' source_body.txt
              cat source_body.txt > tmp_body.txt
              mv tmp_body.txt body.txt
            fi
          fi

          sed -i "s#\[ \] This is a backport pr#\[x\] This is a backport pr#g" body.txt
          if [[ "${ori_body}" != $(cat body.txt) ]]; then
            gh pr edit ${PR_NUMBER} -R ${REPO} -F body.txt
          fi

      - name: check backport pr's title
        if: github.base_ref != 'main' && contains(toJson(github.event.pull_request.body), '[x] This is a backport pr')
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          count=$(echo "${PR_TITLE}" | grep -E '\(backport #[0-9]+)$' | wc -l)
          if [[ $count -le 0 ]]; then
            echo "::error::Backport PR title is not valid. It should end with '(backport #[0-9]+)'"
            exit 1
          fi

      - name: check backport option
        if: >
          github.base_ref != 'main' && github.event.action != 'opened' &&
          !contains(toJson(github.event.pull_request.body), '[x] This is a backport pr') &&
          !contains(toJson(github.event.pull_request.body), '[ ] This is a backport pr')

        run: |
          echo "::error::Branch PR does not contain the backport option!"
          exit 1

  backport-check-subtask:
    needs: title-check
    runs-on: ubuntu-latest
    if: >
      (
        startsWith(github.event.pull_request.title, '[BugFix]') ||
        startsWith(github.event.pull_request.title, '[Enhancement]') ||
        startsWith(github.event.pull_request.title, '[Doc]') ||
        startsWith(github.event.pull_request.title, '[UT]')
      ) && !contains(github.event.pull_request.title, 'cherry-pick') && !contains(github.event.pull_request.title, 'backport')
    strategy:
      fail-fast: false
      matrix:
        version: ["4.1", "4.0", "3.5", "3.4", "3.3"]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.number }}
    steps:
      # Rapid checkbox edits arrive as a burst of `edited` events whose runs can
      # start out of order under cancel-in-progress, so the surviving run may
      # hold a stale body snapshot. Read the live PR state instead of the payload.
      - name: sync ${{ matrix.version }} label
        env:
          VERSION: ${{ matrix.version }}
        run: |
          body=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.body // ""')
          # any(. == $v), not contains(): jq array containment matches strings
          # by substring, so labels like "4.1-merged" or "4.1.0" would count as "4.1"
          has_label=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" --jq "any(.[].name; . == \"${VERSION}\")")
          version_re=${VERSION//./\\.}
          if grep -qiE "^[[:space:]]*-[[:space:]]*\[x\][[:space:]]+${version_re}[[:space:]]*$" <<< "$body"; then
            if [[ "$has_label" == "false" ]]; then
              gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" -f "labels[]=${VERSION}"
            fi
          elif grep -qiE "^[[:space:]]*-[[:space:]]*\[[[:space:]]?\][[:space:]]+${version_re}[[:space:]]*$" <<< "$body"; then
            if [[ "$has_label" == "true" ]]; then
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels/${VERSION}"
            fi
          fi

      - name: check-done
        run: |
          body=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.body // ""')
          if grep -qiE '^[[:space:]]*-[[:space:]]*\[[[:space:]]?\][[:space:]]+I have checked the version labels' <<< "$body"; then
            echo "::error::You must mark this checkbox - I have checked the version labels which the pr will be auto-backported to the target branch"
            exit 1
          fi

  backport-check:
    runs-on: ubuntu-latest
    needs: backport-check-subtask
    if: always() && needs.backport-check-subtask.result != 'skipped'
    steps:
      - name: Check subtask status
        if: needs.backport-check-subtask.result == 'failure'
        run: |
          exit 1

  behavior-check:
    runs-on: ubuntu-latest
    if: >
      !startsWith(github.event.pull_request.title, '[Doc]') &&
      !startsWith(github.event.pull_request.title, 'Revert ') &&
      (github.base_ref == 'main' || !startsWith(github.head_ref, 'mergify/bp/') || github.event.action != 'opened')
    steps:
      # Parse checkbox lines with whitespace/case-tolerant regexes instead of
      # exact-literal contains(): an extra space after `[ ]` or an uppercase `[X]`
      # must not fail the check. Read the live body (see backport-check-subtask).
      - name: Format Check
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          body=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.body // ""')
          checkbox='^[[:space:]]*-[[:space:]]*\['
          yes_text='Yes, this PR will result in a change in behavior'
          no_text='No, this PR will not result in a change in behavior'
          yes_line=false; yes_checked=false; no_line=false; no_checked=false
          grep -qiE "${checkbox}[x[:space:]]?\][[:space:]]+${yes_text}" <<< "$body" && yes_line=true
          grep -qiE "${checkbox}x\][[:space:]]+${yes_text}" <<< "$body" && yes_checked=true
          grep -qiE "${checkbox}[x[:space:]]?\][[:space:]]+${no_text}" <<< "$body" && no_line=true
          grep -qiE "${checkbox}x\][[:space:]]+${no_text}" <<< "$body" && no_checked=true
          if [[ "$yes_line" == "false" || "$no_line" == "false" ]]; then
            echo "::error::PR body is missing the behavior change template line(s) ('- [ ] Yes, this PR will result...' / '- [ ] No, this PR will not result...'). Please restore the section from the PR template."
            exit 1
          fi
          if [[ "$yes_checked" == "true" && "$no_checked" == "true" ]]; then
            echo "::error::Both Yes and No are checked in the behavior change section. Please check exactly one."
            exit 1
          fi
          if [[ "$yes_checked" == "false" && "$no_checked" == "false" ]]; then
            echo "::error::Neither Yes nor No is checked in the behavior change section. Please check exactly one."
            exit 1
          fi
          if [[ "$yes_checked" == "true" ]]; then
            type_checked=false
            for change_type in 'Interface/UI changes' 'Parameter changes' 'Policy changes' 'Feature removed' 'Miscellaneous'; do
              grep -qiE "${checkbox}x\][[:space:]]+${change_type}" <<< "$body" && type_checked=true
            done
            if [[ "$type_checked" == "false" ]]; then
              echo "::error::You must specify the type of change!"
              exit 1
            fi
          fi
          echo "yes_checked=${yes_checked}" >> "$GITHUB_OUTPUT"
          echo "no_checked=${no_checked}" >> "$GITHUB_OUTPUT"

      - name: Behavior Unchanged Label
        if: steps.check.outputs.no_checked == 'true'
        uses: actions-ecosystem/action-remove-labels@v1
        with:
          labels: "behavior_changed"

      - name: Behavior Changed Label
        if: steps.check.outputs.yes_checked == 'true'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: "behavior_changed"

  automerge-check:
    runs-on: ubuntu-latest
    needs: backport-check
    if: >
      !failure() &&
      github.base_ref != 'main' &&
      startsWith(github.head_ref, 'mergify/') &&
      (contains(github.event.pull_request.title, 'cherry-pick') || 
      contains(github.event.pull_request.title, 'backport'))
    steps:
      - name: add automerge label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: automerge

      - name: automerge
        uses: peter-evans/enable-pull-request-automerge@v2
        with:
          token: ${{ secrets.PAT }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash

  changelist-check:
    runs-on: [self-hosted, normal]
    if: >
      (github.event.action == 'opened' || github.event.action == 'synchronize') &&
      !contains(github.event.pull_request.title, 'cherry-pick') &&
      !contains(github.event.pull_request.title, 'backport')
    env:
      PR_NUMBER: ${{ github.event.number }}
      GH_TOKEN: ${{ secrets.PAT }}
    steps:
      - name: CHECK CHANGELIST
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull && source lib/init.sh
          ./bin/check-pr-changelist.sh

