name: UNSTABLE CASE REVIEW

# Re-executes blacklisted unstable cases in isolation, on demand.
# Cases that now pass are auto-removed from unstable_case.json.
# Still-failing cases get AI analysis in an HTML report uploaded to OSS.
# Runs on the native ubuntu server ([self-hosted, ubuntu, ai]).
# Manual-only for now (schedule removed): once validated and self-hosted
# [ubuntu, ai] runners are registered, a schedule can be re-added.

on:
  workflow_dispatch:
    inputs:
      case_types:
        description: >
          Case types to review.
          Comma-separated: FE-UT, BE-UT, SQL-Tester, TIMEOUT, or "all".
        required: false
        default: 'all'
        type: string
      branch:
        description: 'Branch to review (default: main)'
        required: false
        default: 'main'
        type: string
      runs:
        description: 'Consecutive runs per case for the stability check (default 3; set 1 for a quick debug run)'
        required: false
        default: '3'
        type: string
      grant_probation:
        description: 'Open a PR moving now-passing blacklisted cases into PROBATION (default false; needs SYNC_PAT to open the PR)'
        required: false
        default: 'false'
        type: string

permissions:
  checks: write
  actions: write
  contents: write
  pull-requests: write

env:
  IS_INSPECTION: 'true'
  SHARE_PATH: /var/local/env
  # Consecutive-run count for the stability check, consumed by ci-tool
  # run-sql-tester.sh / elastic-ut-review.sh (default 3; 1 = quick debug).
  REVIEW_RUNS: ${{ inputs.runs || '3' }}

jobs:
  # ─── Info / gate ─────────────────────────────────────────────────────────
  prepare:
    name: PREPARE
    runs-on: [self-hosted, ubuntu, ai]
    outputs:
      BRANCH:          ${{ steps.info.outputs.BRANCH }}
      COMMIT_SHA:      ${{ steps.info.outputs.COMMIT_SHA }}
      RUN_FE_UT:       ${{ steps.info.outputs.RUN_FE_UT }}
      RUN_BE_UT:       ${{ steps.info.outputs.RUN_BE_UT }}
      RUN_SQL_TESTER:  ${{ steps.info.outputs.RUN_SQL_TESTER }}
      CASE_SUMMARY:    ${{ steps.info.outputs.CASE_SUMMARY }}
    steps:
      - name: Setup
        id: info
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull >/dev/null

          BRANCH="${{ inputs.branch || 'main' }}"
          CASE_TYPES="${{ inputs.case_types || 'all' }}"

          COMMIT_SHA=$(gh api /repos/${REPO}/branches/${BRANCH} | jq -r .commit.sha)
          [[ "${COMMIT_SHA}" == "null" ]] && (echo "::error::Failed to get HEAD SHA for ${BRANCH}" && exit 1)

          echo "Branch: ${BRANCH}  SHA: ${COMMIT_SHA:0:8}  Types: ${CASE_TYPES}"
          echo "BRANCH=${BRANCH}"         >> $GITHUB_OUTPUT
          echo "COMMIT_SHA=${COMMIT_SHA}" >> $GITHUB_OUTPUT

          python3 bin/review-unstable-cases.py prepare \
            --json files/unstable_case.json \
            --repo "${{ github.repository }}" \
            --branch "${BRANCH}" \
            --case-types "${CASE_TYPES}"

  # ─── FE-UT (includes TIMEOUT cases with #) ───────────────────────────────
  fe-ut-review:
    name: FE-UT REVIEW
    needs: prepare
    if: ${{ needs.prepare.outputs.RUN_FE_UT == 'true' }}
    runs-on: [self-hosted, ubuntu, ai]
    env:
      BRANCH:      ${{ needs.prepare.outputs.BRANCH }}
      COMMIT_SHA:  ${{ needs.prepare.outputs.COMMIT_SHA }}
      # elastic-ut-review.sh clones the repo inside the ECI via
      # https://$GITHUB_ACCESS_TOKEN@github.com/... . On forks/CelerData the
      # [ubuntu, ai] runner's init.sh does not inject GITHUB_ACCESS_TOKEN. The
      # run token must use the x-access-token: form (a bare GITHUB_TOKEN as the
      # userinfo is rejected). No-op for the public StarRocks/starrocks clone.
      GITHUB_ACCESS_TOKEN: "x-access-token:${{ github.token }}"
    outputs:
      oss_path: ${{ steps.run_ut.outputs.oss_path }}
    steps:
      - name: Run FE-UT (targeted unstable cases only)
        id: run_ut
        timeout-minutes: 180
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull >/dev/null && source lib/init.sh
          ./bin/elastic-ut-review.sh \
            --repository ${{ github.repository }} \
            --branch ${BRANCH} \
            --commit ${COMMIT_SHA} \
            --module fe \
            --linuxdistro ubuntu

      - name: Clean ECI
        if: always() && steps.run_ut.outputs.ECI_ID != ''
        run: eci rm ${{ steps.run_ut.outputs.ECI_ID }} || true

      - name: Clean ENV
        if: always()
        run: |
          rm -f  "${{ steps.run_ut.outputs.RES_FILE }}"  || true
          rm -f  "${{ steps.run_ut.outputs.RES_LOG }}"   || true
          rm -rf "${{ steps.run_ut.outputs.FE_REPORT_DIR }}" || true
          rm -rf ${{ github.workspace }}/*

  # ─── BE-UT ───────────────────────────────────────────────────────────────
  be-ut-review:
    name: BE-UT REVIEW
    needs: prepare
    if: ${{ needs.prepare.outputs.RUN_BE_UT == 'true' }}
    runs-on: [self-hosted, ubuntu, ai]
    env:
      BRANCH:      ${{ needs.prepare.outputs.BRANCH }}
      COMMIT_SHA:  ${{ needs.prepare.outputs.COMMIT_SHA }}
      # See FE-UT REVIEW: pass the run token so the in-ECI git clone in
      # elastic-ut-review.sh has credentials on the [ubuntu, ai] runner.
      GITHUB_ACCESS_TOKEN: "x-access-token:${{ github.token }}"
    outputs:
      oss_path: ${{ steps.run_ut.outputs.oss_path }}
    steps:
      - name: Run BE-UT (targeted unstable cases only)
        id: run_ut
        timeout-minutes: 240
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull >/dev/null && source lib/init.sh
          ./bin/elastic-ut-review.sh \
            --repository ${{ github.repository }} \
            --branch ${BRANCH} \
            --commit ${COMMIT_SHA} \
            --module be \
            --linuxdistro ubuntu

      - name: Clean ECI
        if: always() && steps.run_ut.outputs.ECI_ID != ''
        run: eci rm ${{ steps.run_ut.outputs.ECI_ID }} || true

      - name: Clean ENV
        if: always()
        run: |
          rm -f  "${{ steps.run_ut.outputs.RES_FILE }}"  || true
          rm -f  "${{ steps.run_ut.outputs.RES_LOG }}"   || true
          rm -rf ${{ github.workspace }}/*

  # ─── Deploy SR + SQL-Tester + Teardown (single job, same runner) ─────────
  sql-tester-review:
    name: SQL-TESTER REVIEW
    needs: prepare
    if: ${{ needs.prepare.outputs.RUN_SQL_TESTER == 'true' }}
    runs-on: [self-hosted, ubuntu, ai]
    env:
      BRANCH:        ${{ needs.prepare.outputs.BRANCH }}
      PR_NUMBER:     ${{ needs.prepare.outputs.COMMIT_SHA }}
      WEEKLY_REVIEW: 'true'
      LINUX_DISTRO:  ubuntu
      BUILD_TYPE:    Release
    outputs:
      sql_oss_path: ${{ steps.run.outputs.sql_oss_path }}
    steps:
      - name: Clean Workspace
        run: rm -rf ${{ github.workspace }} && mkdir -p ${{ github.workspace }}

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target branch and commit
        run: |
          git checkout ${BRANCH}
          git reset ${PR_NUMBER} --hard

      - name: Apply for ECS & Deploy SR
        id: deploy
        timeout-minutes: 30
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull >/dev/null && source lib/init.sh
          ./bin/elastic-cluster.sh --template ci-admit --linuxdistro ubuntu
          _oss="/var/local/env/ossutil64 --config-file /root/.ossutilconfig"
          # Deploy the latest inspection build. The inspection-pipeline does a
          # periodic FULL build of the branch (BE+FE together, keyed by the
          # 40-char commit sha) under <owner>-ci-release/<branch>/Release/inspection/pr/ubuntu/,
          # so it is ALWAYS a complete pair. The bucket and the tar-name prefix are
          # derived from github.repository_owner, so the same workflow works in
          # whatever org/fork runs it (no hardcoded owner).
          # NOTE: OSS auto-deletes these after 3 days, so the inspection-pipeline
          # schedule must be enabled for ${BRANCH} or there is nothing to deploy.
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          [[ "$owner" == "starrocks" ]] && bucket="starrocks-ci-release" || bucket="${owner}-ci-release"
          product="${{ github.repository_owner }}"   # tar-name prefix = the org name
          _base="oss://${bucket}/${BRANCH}/Release/inspection/pr/ubuntu"
          LATEST_SHA=$(${_oss} ls "${_base}/" | grep '\-BE\.tar\.gz' | sort -r | head -1 | awk '{print $NF}' | grep -oE '[a-f0-9]{40}')
          [[ -z "${LATEST_SHA}" ]] && echo "::error::No inspection package under ${_base}/ -- is the inspection-pipeline schedule enabled for ${BRANCH}? (packages auto-delete after 3 days)" && exit 1
          SHORT_SHA=${LATEST_SHA:0:7}
          BE_OUTPUT_TAR="${_base}/${LATEST_SHA}/be/${product}-${SHORT_SHA}-BE.tar.gz"
          FE_OUTPUT_TAR="${_base}/${LATEST_SHA}/fe/${product}-${SHORT_SHA}-FE.tar.gz"
          echo "BE: ${BE_OUTPUT_TAR}"
          echo "FE: ${FE_OUTPUT_TAR}"
          export BE_OUTPUT_TAR FE_OUTPUT_TAR LINUX_DISTRO=ubuntu
          ./bin/deploy-cluster.sh -c ci-admit

      - name: Run SQL-Tester (inspection mode)
        id: run
        if: steps.deploy.outcome == 'success'
        timeout-minutes: 360
        env:
          FE_NODE:      ${{ steps.deploy.outputs.fe }}
          BE_NODE:      ${{ steps.deploy.outputs.be }}
          CLUSTER_NAME: ci-admit
        run: |
          cd ci-tool && source lib/init.sh

          # Compute the OSS path used by run-sql-tester.sh in IS_INSPECTION mode
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BUCKET="${owner}-ci-release"
          SQL_OSS="oss://${BUCKET}/inspection/${PR_NUMBER}/sql-tester/Release/ubuntu/native"
          echo "sql_oss_path=${SQL_OSS}" >> $GITHUB_OUTPUT

          ./bin/run-sql-tester.sh

      - name: Backup logs
        if: always()
        run: |
          cd ci-tool && source lib/init.sh
          ./bin/backup_log_cores.sh || true

      - name: Clean MySQL ECI
        if: always() && steps.run.outputs.MYSQL_ECI_ID != ''
        run: eci rm ${{ steps.run.outputs.MYSQL_ECI_ID }} || true

      - name: Delete ECS cluster
        if: always()
        run: |
          cd ci-tool && source lib/init.sh
          ./bin/elastic-cluster.sh --delete || true

      - name: Clean ENV
        if: always()
        run: rm -rf ${{ github.workspace }}/*

  # ─── Generate report & update JSON ───────────────────────────────────────
  report:
    name: REPORT
    needs: [prepare, fe-ut-review, be-ut-review, sql-tester-review]
    if: always() && needs.prepare.result == 'success'
    runs-on: [self-hosted, ubuntu, ai]
    env:
      BRANCH:              ${{ needs.prepare.outputs.BRANCH }}
      COMMIT_SHA:          ${{ needs.prepare.outputs.COMMIT_SHA }}
      # AI analysis is fully decoupled into a separate workflow
      # (unstable-case-ai-analysis.yml); this job no longer needs
      # ANTHROPIC_API_KEY.
    steps:
      - name: Generate report & update unstable_case.json
        id: gen
        run: |
          rm -rf ./ci-tool && cp -rf /var/lib/ci-tool ./ci-tool && cd ci-tool && git pull >/dev/null && source lib/init.sh

          CASE_TYPES="${{ inputs.case_types || 'all' }}"
          FE_OSS="${{ needs.fe-ut-review.outputs.oss_path }}"
          BE_OSS="${{ needs.be-ut-review.outputs.oss_path }}"
          SQL_OSS="${{ needs.sql-tester-review.outputs.sql_oss_path }}"
          WORK_DIR="/tmp/unstable-review-${GITHUB_RUN_ID}"

          python3 bin/review-unstable-cases.py report \
            --json     files/unstable_case.json \
            --repo     "${{ github.repository }}" \
            --branch   "${BRANCH}" \
            --commit   "${COMMIT_SHA}" \
            --case-types "${CASE_TYPES}" \
            --fe-oss-path  "${FE_OSS}"  \
            --be-oss-path  "${BE_OSS}"  \
            --sql-oss-path "${SQL_OSS}" \
            --output-dir "${WORK_DIR}" \
            --recovered-pool files/unstable_case_recovered_pool.json

          echo "WORK_DIR=${WORK_DIR}" >> $GITHUB_OUTPUT

      - name: Publish test results (Checks tab)
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: "${{ steps.gen.outputs.JUNIT_PATH }}"
          check_name: 'Unstable Case Review'
          fail_on_failure: false
          detailed_summary: true
          include_passed: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload report to OSS
        id: upload
        run: |
          WORK_DIR="${{ steps.gen.outputs.WORK_DIR }}"
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          [[ "$owner" == "starrocks" ]] && bucket="starrocks-ci-release" || bucket="${owner}-ci-release"
          REPORT_OSS="oss://${bucket}/unstable-case-review/${BRANCH}/${COMMIT_SHA:0:8}/"
          /var/local/env/ossutil64 --config-file /root/.ossutilconfig \
            cp "${WORK_DIR}/report.html" "${REPORT_OSS}report.html" -f
          echo "REPORT_URL=${REPORT_OSS}report.html" >> $GITHUB_OUTPUT

      - name: Upload report artifact (fallback, always)
        # So an OSS outage doesn't lose the report — same fallback as
        # unstable-case-ai-analysis.yml.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unstable-case-review-report
          path: ${{ steps.gen.outputs.WORK_DIR }}
          if-no-files-found: warn
          retention-days: 14

      - name: Open PR updating recovered pool
        # §13.1/§13.2: review is discovery-only — it writes recovered candidates to
        # unstable_case_recovered_pool.json; the promote-demote workflow drips them
        # into probation. This step opens a PR carrying the pool update.
        # Opt-in via the grant_probation input (kept for backward compat — same
        # cron/dispatch flag). Needs SYNC_PAT and [ubuntu, ai] runners.
        if: ${{ inputs.grant_probation == 'true' }}
        id: open_pr
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          cd ci-tool
          git config user.name  "wanpengfei-git"
          git config user.email "wanpengfei91@163.com"

          # Discovery-only now touches just the recovered pool; skip if unchanged.
          if git diff --quiet files/unstable_case_recovered_pool.json; then
            echo "No recovered-pool changes this run — skipping PR"
            echo "pr_url=" >> $GITHUB_OUTPUT
            echo "_recovered pool unchanged → no PR opened._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Per-attempt branch: GITHUB_RUN_ID is stable across re-runs (only
          # RUN_ATTEMPT increments), so include RUN_ATTEMPT or a retry after a
          # partial failure reuses the branch and the push is rejected
          # non-fast-forward.
          BR="auto/recovered-pool-$(date +%Y-%m-%d)-${COMMIT_SHA:0:8}-r${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT:-1}"
          git checkout -b "$BR"
          git add files/unstable_case_recovered_pool.json
          git commit -m "[Tool] update recovered pool ${BRANCH} ${COMMIT_SHA:0:8} (auto)"
          git push origin "$BR"

          # YAML's run: | block strips the common indent, so the heredoc body and EOF
          # end up at column 0 from bash's perspective — no further sed/dedent needed.
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" <<EOF
          Auto-generated by [unstable-case-review run #${GITHUB_RUN_ID}](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}).

          Cases that passed all 3 isolation rounds are added to the **recovered pool** (\`unstable_case_recovered_pool.json\`). Review is now discovery-only: the pool is the durable candidate list, and the **promote-demote workflow drips** cases from it into probation up to the target watermark (no re-running this regression per batch). An isolated green is not PR-concurrency stable, so probation + promote-demote still decide the final outcome.

          Please sanity-check the diff.
          EOF

          PR_URL=$(gh pr create \
            --repo StarRocks/ci-tool \
            --base main \
            --head "$BR" \
            --title "[Tool] update recovered pool $(date +%Y-%m-%d) (auto)" \
            --body-file "$BODY_FILE")
          rm -f "$BODY_FILE"
          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT
          echo "Opened PR: ${PR_URL}"
          echo "**recovered-pool PR opened:** ${PR_URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify int-cd-rd-ci Slack channel
        if: steps.open_pr.outputs.pr_url != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          # Jackie Liu's Slack ID lives in ci-tool/conf/member_slack.json under his GitHub login
          REVIEWER_LOGIN="huailiu1122"
          REVIEWER_SLACK_ID=$(jq -r --arg login "$REVIEWER_LOGIN" '.[$login] // empty' ci-tool/conf/member_slack.json)

          PR_URL="${{ steps.open_pr.outputs.pr_url }}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          CHANNEL_ID="C0APHDFLAQ7"   # int-cd-rd-ci

          if [[ -n "$REVIEWER_SLACK_ID" ]]; then
            MENTION="<@${REVIEWER_SLACK_ID}>"
          else
            # Fallback: tag by GitHub handle so the message is still actionable
            MENTION="@${REVIEWER_LOGIN}"
          fi

          MSG=$(printf ':robot_face: Weekly unstable-case review cleanup ready for confirmation:\n• Run: %s\n• PR:  %s\n\n%s please review and merge.' "$RUN_URL" "$PR_URL" "$MENTION")

          # Reuse ci-tool's slack_notify.py (--mode channel) instead of inlining
          # curl; keeps the Slack-API wire format in one place (lib/slack_lib.py).
          python3 ci-tool/lib/slack_notify.py \
            --mode channel \
            --token "${SLACK_BOT_TOKEN}" \
            --channel "${CHANNEL_ID}" \
            --text "${MSG}"

      - name: Clean ENV
        if: always()
        run: |
          rm -rf "${{ steps.gen.outputs.WORK_DIR }}" || true
          rm -rf ${{ github.workspace }}/*
