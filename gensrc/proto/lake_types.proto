syntax = "proto2";

package starrocks;
option java_package = "com.starrocks.proto";

import "types.proto";
import "tablet_schema.proto";
import "olap_file.proto";
import "olap_common.proto";

message DelvecDataPB {
    optional int64 version = 1;
    // serialized data
    optional bytes data = 2;
}

message DelvecPagePB {
    optional int64 version = 1;
    // position in file
    optional uint64 offset = 2;
    optional uint64 size = 3;
    optional uint32 crc32c = 4;
    // For upgrade compatibility.
    optional int64 crc32c_gen_version = 5;
}

message PersistentIndexSstableRangePB {
    // key range is [start_key, end_key].
    optional bytes start_key = 1;
    optional bytes end_key = 2;
}

message PersistentIndexSstablePB {
    optional int64 version = 1; // Deprecated
    optional string filename = 2;
    optional int64 filesize = 3;
    // used for rebuild point of persistent index
    optional uint64 max_rss_rowid = 4;
    optional bytes encryption_meta = 5;
    // Whether this file shared by multiple tablets
    optional bool shared = 6 [default=false];
    // For sstable generated during data write & compaction process.
    optional uint32 shared_rssid = 8;
    optional int64 shared_version = 9;
    // For sstable generated during compaction process.
    optional DelvecPagePB delvec = 10;
    optional PersistentIndexSstableRangePB range = 11;
    // This file's fileset id. All files under same fileset should be non-overlapped.
    optional PUniqueId fileset_id = 12;
    // Offset applied to rssid when reusing sstables across tablets (e.g., tablet merge).
    optional int32 rssid_offset = 13 [default = 0];
}

message PersistentIndexSstableMetaPB {
    // sstables are ordered with the smaller version on the left.
    repeated PersistentIndexSstablePB sstables = 1;
}

message DelvecCacheKeyPB {
    optional int64 id = 1;
    optional DelvecPagePB delvec_page = 2;
}

message FileMetaPB {
    optional string name = 1;
    optional int64 size = 2;
    // Whether this file shared by multiple tablets
    optional bool shared = 3 [default=false];
    optional bytes encryption_meta = 4;
}

message DelvecMetadataPB {
    // map from version to delete vector file meta
    // so that we no need to keep file name (consume more memory) in each DelvecPagePB
    // instead we can lookup delete vector file name by version saved in DelvecPagePB
    map<int64, FileMetaPB> version_to_file = 1;
    // from segment id to delvec page
    map<uint32, DelvecPagePB> delvecs = 2;
}

// Physical layout of a delta-column-group file (parallel to column_files).
// DENSE_COLS  : the historical `.cols` file — one rewritten column per uid,
//               row-complete against the source segment (ordinal == base rowid).
// SPARSE_PERCOL: a `.spcols` Sparse Delta Column Group file — a standard
//               Segment v2 carrying a leading source_rowid column plus the
//               update value columns, covering only K updated rows. Read as an
//               overlay layer (version-ascending, last-write-wins).
// Default 0 == DENSE_COLS so legacy metadata (no file_kinds) reads as all-dense.
enum DeltaColumnFileKindPB {
    DENSE_COLS = 0;
    SPARSE_PERCOL = 1;
}

// Per-file presence summary for a SPARSE_PERCOL `.spcols` overlay. Describes which
// base segment rows the sparse file touches, as the [min, max] closed range of the
// sorted source_rowid column plus the row count K. This is a coarse summary (range,
// not a full bitmap): a reader can skip a sparse layer entirely when the rowid it is
// resolving falls outside [min_source_rowid, max_source_rowid], without opening the
// `.spcols` file. min/max are base-segment ordinals (0-based); row_count == K ==
// footer.num_rows of the sparse file. For DENSE_COLS entries / legacy metadata the
// parallel slot is padded with an empty SparsePresencePB (all fields absent ==
// unknown), so the `presences` array stays strictly 1:1 with column_files (mirroring
// the file_kinds normalization rule). An absent/empty message means "unknown": the
// reader must fall back to opening the file (no skip).
message SparsePresencePB {
    optional int64 min_source_rowid = 1;
    optional int64 max_source_rowid = 2;
    optional int64 row_count = 3;
}

// Per-COLUMN presence inside a PACKED SPARSE_PERCOL `.spcols` file (flexible / per-row
// heterogeneous partial update). A packed file is a UNION over several rowid equivalence
// classes: column 0 is the ascending union source_rowid vector (K_union rows), and every
// value column physically has K_union rows -- real values at the union ordinals that column
// actually covers, append_default placeholders elsewhere. The placeholder rows are PHYSICAL
// NULLs that MUST NEVER be applied: a [min,max] range is INSUFFICIENT to gate them because
// columns interleave within the union (applying at a placeholder ordinal would overwrite a
// real base value with NULL == silent corruption). Therefore each entry carries the EXACT
// covered base-segment rowid set as a serialized 32-bit CRoaring bitmap so the reader applies
// a column's overlay ONLY at the rows that column truly covers. min/max/count still serve the
// cheap zero-IO range skip; `roaring` is the authoritative apply gate.
//
// One entry per UPDATE column uid carried by the packed file (NOT the reserved source_rowid
// uid). For a HOMOGENEOUS (single equivalence class) `.spcols` the packing degenerates to one
// class with no placeholders: the per-file SparsePresencePB already describes every column, so
// the writer OMITS the ColumnPresenceListPB for that file (an empty entry => "no per-column
// override; the whole file's source_rowid column is each column's covered set"). The reader
// falls back to the file-level presence when this list is absent/empty.
message ColumnSparsePresencePB {
    optional uint32 column_uid = 1;
    // Cheap pre-filter: [min, max] closed range of THIS column's covered source_rowids
    // (== first/last of its covered set). Used for the zero-IO range skip; NOT sufficient
    // as the apply gate (see `roaring`).
    optional int64 min_source_rowid = 2;
    optional int64 max_source_rowid = 3;
    // Exact number of union rows this column covers (== set bits in `roaring`). Differs from
    // the packed file's K_union when the column does not cover the whole union.
    optional int64 count = 4;
    // Serialized 32-bit CRoaring portable bitmap of the EXACT base-segment rowids this column
    // covers. The authoritative apply gate: the reader applies the column's overlay only at
    // these rowids, never at the union placeholders. Absent => fall back to the file-level
    // presence (homogeneous / single-class file).
    optional bytes roaring = 5;
}

// Per-column presence for ONE packed `.spcols` file: a list with one ColumnSparsePresencePB
// per UPDATE column uid the file carries. This is the transposed (column-view) form of the
// row-view `__cset__` set-id dictionary that the `.upt` carries: the finalize handler reads
// `__cset__` from the `.upt`, decodes each upt row's set-id into a column-uid mask via the
// RowsetTxnMetaPB.distinct_column_sets dictionary, groups columns into equivalence classes by
// identical covered rowid set, packs all sparse classes into one union file, and emits this
// list so the reader can gate each column independently.
message ColumnPresenceListPB {
    repeated ColumnSparsePresencePB entries = 1;
}

// An inline sparse patch is a `.spcols`-equivalent overlay carried INSIDE the tablet
// metadata instead of in a separate file. It rides the per-publish TabletMetadataPB PUT
// that lake already does, so micro-batches pay ZERO new object PUTs (no .spcols file, no
// extra meta-cost object). It is semantically identical to a SPARSE_PERCOL `.spcols`
// layer: K updated rows of a fixed column set, keyed by an ascending source_rowid list,
// applied version-ascending as a last-write-wins overlay. It interleaves with the
// file-backed entries by `version`: a reader merges file layers (versions[]) and inline
// patches (this version) into one version-ordered stack.
//
// Sizing: inline patches are byte-budgeted (config sdcg_inline_patch_max_bytes per patch
// and sdcg_dcg_meta_max_bytes_per_segment for the cumulative per-segment meta), because
// the enclosing TabletMetadataPB is RE-UPLOADED every publish for its whole lifetime; a
// large/long-lived inline patch would be retransmitted O(versions) times. Exceeding the
// budget biases the writer to a `.spcols` FILE instead (a one-time immutable object).
message InlineSparsePatchPB {
    // Publish version this patch was produced at. Interleaves with DeltaColumnGroupVerPB
    // file entries' versions[] to give the version-ordered (ascending-apply) overlay stack.
    optional int64 version = 1;
    // The UPDATE column unique ids this patch carries. Parallel to column_values: the i-th
    // blob in column_values is the value column for column_uids[i]. Must be non-empty.
    repeated uint32 column_uids = 2;
    // K = number of rows in this patch (== source_rowids length == each column_values
    // column's row count). Must be > 0.
    optional int64 row_count = 3;
    // K x uint32 little-endian, ascending. Base-segment ordinals (source rowids) the patch
    // touches. Same role as the source_rowid column of a `.spcols` file.
    optional bytes source_rowids = 4;
    // One serialized value column per column_uids entry (same order). Each blob is the K-row
    // value column serialized via serde::ColumnArraySerde. The reader deserializes into the
    // column type taken from the read schema for that uid.
    repeated bytes column_values = 5;
    // Presence pre-filter: the [min, max] closed range of source_rowids (== first/last of the
    // ascending list). Lets a reader skip an out-of-range inline layer with zero work.
    optional int64 min_source_rowid = 6;
    optional int64 max_source_rowid = 7;
}

message DeltaColumnGroupVerPB {
    repeated DeltaColumnGroupColumnIdsPB unique_column_ids = 1;
    repeated string column_files = 2;
    // To do conflict check with compaction task
    repeated int64 versions = 3;
    repeated bytes encryption_metas = 4;
    // Whether files are shared by multiple tablets
    repeated bool shared_files = 5;
    // Per-file size of each `.cols` file, strictly 1:1 with column_files.
    // 0 means unknown (data written before this field existed); readers then
    // fall back to stat/HeadObject to discover the file size.
    repeated int64 column_file_sizes = 6 [packed = true];
    // === SDCG (Sparse Delta Column Group) ===
    // Per-file kind, parallel to column_files. Empty (legacy) => every entry is
    // DENSE_COLS. Readers treat an out-of-range index as DENSE_COLS, so the
    // array is only emitted when at least one SPARSE_PERCOL file exists.
    repeated DeltaColumnFileKindPB file_kinds = 7;
    // Per-file presence summary, parallel to column_files (1:1 when present). Each
    // SPARSE_PERCOL entry carries the [min, max] source_rowid range and K of its
    // `.spcols` file so a reader can skip the layer when the requested rowid is out
    // of range without opening the file. DENSE_COLS entries / legacy slots are padded
    // with an empty SparsePresencePB (all fields absent == unknown), keeping the array
    // strictly 1:1 with column_files (same normalization rule as file_kinds). The
    // array is only emitted when at least one SPARSE_PERCOL file is present; otherwise
    // it is absent and readers treat every entry as unknown (== legacy, no skip).
    // NOTE: ordinal 8 was previously documented as "reserved by convention"; it is now
    // claimed for this field. NEVER reuse it for anything else.
    repeated SparsePresencePB presences = 8;
    // Number of rows stored in each SPARSE_PERCOL file (== footer.num_rows == K),
    // parallel to column_files. 0 for DENSE_COLS entries / when unknown.
    repeated int64 sparse_row_counts = 9 [packed = true];
    // Row count (M) of the base segment that the sparse files in this entry list
    // were derived from. Used as a fingerprint guard (max(source_rowid) < M).
    // 0 / absent == unknown (legacy or dense-only metadata).
    optional int64 source_segment_num_rows = 10;
    // Inline sparse patches: `.spcols`-equivalent overlays carried in meta (no file). A
    // SEPARATE AXIS from column_files (they are not files; do NOT count toward the file
    // parallel arrays above). Each rides the per-publish meta PUT (zero new objects). The
    // reader merges these with the file entries ordered by version (ascending apply,
    // last-write-wins); a DENSE file below an inline layer still terminates the walk for
    // its covered uids. Empty (legacy / no micro-batch inline) => behaves exactly as before.
    repeated InlineSparsePatchPB inline_patches = 11;
    // Per-COLUMN presence for PACKED SPARSE_PERCOL files (flexible / per-row heterogeneous
    // partial update). Parallel to column_files (1:1 when present, same normalization rule as
    // file_kinds / presences). Each slot is the per-column presence list of the corresponding
    // packed `.spcols` file: one ColumnSparsePresencePB per UPDATE column uid the file carries,
    // each carrying the EXACT covered base-segment rowid set (roaring) so the reader applies a
    // column's overlay ONLY at the rows it truly covers and never at a union placeholder.
    //
    // A DENSE entry, a legacy slot, or a HOMOGENEOUS (single equivalence class) sparse file
    // carries an EMPTY ColumnPresenceListPB (entries_size() == 0): the reader then falls back
    // to the file-level SparsePresencePB (whose source_rowid column IS every column's covered
    // set, since a single-class file has no placeholders). The array is only emitted when at
    // least one packed sparse file carries a non-empty per-column list; otherwise it is absent
    // and every entry is treated as "fall back to file-level presence" (== homogeneous, no
    // regression). NEVER reuse ordinal 12 for anything else.
    repeated ColumnPresenceListPB column_presence_lists = 12;
}

message DeltaColumnGroupMetadataPB {
    // from segment id to delta column group
    map<uint32, DeltaColumnGroupVerPB> dcgs = 1;
}

// An Index Delta Group (IDG) entry describes a standalone .idx file
// produced by an ADD INDEX schema change. The file stores index blobs
// for one or more (column, index_type) pairs for a single segment,
// without rewriting the segment data. Mirrors DeltaColumnGroupEntry for
// generated columns but carries index payloads instead of new columns.
message IndexDeltaGroupEntryPB {
    message IndexKey {
        optional int32 col_unique_id = 1;
        optional IndexType index_type = 2;
    }
    // The (column, index_type) pairs covered by this entry, i.e. what
    // this .idx file was built for at creation time.
    repeated IndexKey keys = 1;
    // .idx file name, relative to segment_location (or GIN dir name).
    optional string index_file = 2;
    // alter_version at which this entry was created. Used for:
    //   - visibility filter: only visible to query_version >= version
    //   - compaction conflict detection: entry.version > compact_version
    //     means a racing add-index happened after compaction's base.
    optional int64 version = 3;
    optional bytes encryption_meta = 4;
    // Whether .idx file is shared across tablets (cross-tablet bundle).
    optional bool shared_file = 5 [default=false];
    optional int64 file_size = 6;
    // Tombstone set written by DROP INDEX. A key appearing here is
    // logically removed for read: readers skip it. Physical cleanup
    // happens when compaction rebuilds the segment (keys not in
    // dropped_keys are inlined into the new segment footer, remaining
    // .idx file becomes orphan).
    repeated IndexKey dropped_keys = 7;
}

// Multiple generations of IDG entries on a single segment, newest first.
message IndexDeltaGroupVerPB {
    repeated IndexDeltaGroupEntryPB entries = 1;
}

// Tablet-level IDG metadata: segment_id (global rssid) -> IDG entries.
message IndexDeltaGroupMetadataPB {
    map<uint32, IndexDeltaGroupVerPB> idgs = 1;
}

message DelfileWithRowsetId {
    optional string name = 1;
    // origin rowset that generate this del file.
    optional uint32 origin_rowset_id = 2;
    // Because of historical reason, DELETE don't have its own segment id, we only use
    // `rowset_id + segment_idx` for UPSERT.
    // So if there is a UPSERT and DELETE mix transaction, we use
    // `op_offset` to identify the order of deletes, and rssid of DELETE will be
    // just same as previous UPSERT. And if the Rowset don't have UPSERT, DELETE's rssid
    // will be same as rowset_id.
    //
    // E.g. there are <UPSERT, UPSERT, UPSERT, DELETE, DELETE> in a transaction,
    //      so the `op_offset` of this DELETE is 2.
    //      And rssid of them will be rowset_id + [0, 1, 2, 2, 2].
    //
    //      there are <DELETE, DELETE> in a transaction, so the `op_offset` of this DELETE is 0.
    //      And rssid of them will be rowset_id + [0, 0].
    optional uint32 op_offset = 3;
    optional bytes encryption_meta = 4;
    // Whether this file shared by multiple tablets
    optional bool shared = 5 [default=false];
}

message SegmentMetadataPB {
    optional TuplePB sort_key_min = 1;
    optional TuplePB sort_key_max = 2;
    optional int64 num_rows = 3;
    // Segment index inside the rowset. The global rssid is `rowset_id + segment_idx`.
    // Initially assigned as a contiguous positional index at write time, but may become
    // non-contiguous after operations such as partial compaction or batch merge.
    // Backward compatibility: if absent, consumers should fallback to positional index.
    optional uint32 segment_idx = 4;
    // IDs of vector indexes that need .vi files for this segment.
    // Only populated when the segment meets the build threshold.
    repeated int64 vector_index_ids = 5;
    // Equal-row-interval samples of the sort key, NON-DECREASING.
    // sort_key_samples[i] is the sort key at 0-indexed row (i+1) * interval,
    // where interval == sort_key_sample_row_interval. Always paired with
    // a positive sort_key_sample_row_interval. May be empty when num_rows
    // is not greater than interval (small segments produce no samples
    // because the first sample row is at index `interval`, which only
    // exists for num_rows > interval). Consumed by tablet split and
    // range-split parallel compaction to accurately estimate row
    // distribution for overlapping segments.
    repeated TuplePB sort_key_samples = 6;
    // Row interval used to produce sort_key_samples. Set if and only if
    // sort_key_samples_size() > 0; in that case the value is > 0 and
    // sort_key_samples.size() * sort_key_sample_row_interval < num_rows.
    // Persisted per-segment so a future change to the producer's interval
    // constant cannot break cross-version readers.
    optional int64 sort_key_sample_row_interval = 7;
    // File attributes of the segment. These are the canonical home for the
    // per-segment file info that historically lived in the parallel arrays on
    // RowsetMetadataPB (deprecated_segments / deprecated_segment_size /
    // deprecated_segment_encryption_metas / deprecated_shared_segments /
    // deprecated_bundle_file_offsets). Producers populate these; the legacy
    // arrays are dual-written at save time only for version-rollback compat.
    optional string filename = 8;
    optional int64 size = 9;
    optional bytes encryption_meta = 10;
    // Whether this segment is shared by multiple tablets.
    optional bool shared = 11 [default=false];
    // Offset of this segment inside a bundle file. Use has_bundle_file_offset()
    // to test presence: 0 is a legitimate value (first segment in a bundle).
    optional int64 bundle_file_offset = 12;
}

message RowsetMetadataPB {
    optional uint32 id = 1;
    optional bool overlapped = 2;
    // DEPRECATED: superseded by segment_metas[].filename. Dual-written at save
    // time for version-rollback compat only. Do not read; use segment_metas.
    repeated string deprecated_segments = 3 [json_name = "segments"];
    optional int64 num_rows = 4;
    optional int64 data_size = 5;
    optional DeletePredicatePB delete_predicate = 6;
    // approximate, BE upgrade from old version can't get exact number of dels
    optional int64 num_dels = 7;
    // DEPRECATED: superseded by segment_metas[].size. Dual-written for rollback.
    repeated uint64 deprecated_segment_size = 8 [packed = true, json_name = "segment_size"];
    // May not be empty if this rowset was generated by a compaction task in PK table.
    // We use max_compact_input_rowset_id to decide the rowset order when doing pk recover.
    optional uint32 max_compact_input_rowset_id = 9;
    // The generated version of rowset.
    optional int64 version = 10;
    // del_files are generated when pk table handle delete operation.
    repeated DelfileWithRowsetId del_files = 11;
    // DEPRECATED: superseded by segment_metas[].encryption_meta. Dual-written for rollback.
    repeated bytes deprecated_segment_encryption_metas = 12 [json_name = "segment_encryption_metas"];
    // set in partial compaction, indicate which segment index next compaction should start from
    // only be set > 0 if `overlapped` is true
    optional uint32 next_compaction_offset = 13;
    // DEPRECATED: superseded by segment_metas[].bundle_file_offset. Dual-written for rollback.
    repeated int64 deprecated_bundle_file_offsets = 14 [json_name = "bundle_file_offsets"];
    // DEPRECATED: superseded by segment_metas[].shared. Dual-written for rollback.
    repeated bool deprecated_shared_segments = 15 [json_name = "shared_segments"];
    repeated SegmentMetadataPB segment_metas = 17;
    // Indicates the effective sort key range of this rowset for range distribution table.
    optional TabletRangePB range = 18;
    // Global unique id of this rowset's DATA, alongside the per-tablet local `id`.
    // Minted once at rowset creation and carried verbatim by CopyFrom across SPLIT,
    // cross-publish, linked schema change, and replication, so that siblings produced
    // from the same logical rowset compare equal. MERGE dedups rowsets by uid equality.
    // Optional => backward compatible; legacy rowsets are backfilled at split time.
    optional PUniqueId uid = 19;
}

// At present, the lake persistent index reuses the logic of the persistent index,
// and writes the index to the local disk, which may be upgraded and written to the remote end in the future,
// the type is is to make it upgradable for compatibility.
enum PersistentIndexTypePB {
    LOCAL = 0;
    CLOUD_NATIVE = 1;
}

enum CompactionStrategyPB {
    DEFAULT = 0;
    REAL_TIME = 1;
}

message TabletMetadataPB {
    optional int64 id = 1;
    optional int64 version = 2;
    optional TabletSchemaPB schema = 3;
    repeated RowsetMetadataPB rowsets = 4;
    optional uint32 next_rowset_id = 5;
    // cumulative point rowset index
    optional uint32 cumulative_point = 6;
    optional DelvecMetadataPB delvec_meta = 7;
    // May not be empty if this metadata was generated by a compaction task
    // The data files in the compaction input rowsets would be deleted before
    // the metadata was deleted by the GC module.
    repeated RowsetMetadataPB compaction_inputs = 8;
    // The previous metadata version containing garbage file records, i.e,  the
    // pervious metadata version whose "compaction_inputs" or "orphan_files" is
    // not empty.
    optional int64 prev_garbage_version = 9;
    repeated FileMetaPB orphan_files = 10;
    optional bool enable_persistent_index = 11;
    optional PersistentIndexTypePB persistent_index_type = 12;
    // The commit time on the FE for the transaction that created this tablet metadata.
    // Meansured as the number of seconds since the Epoch, 1970-01-01 00:00:00 +0000 (UTC).
    optional int64 commit_time = 13;
    // If the tablet is replicated from another cluster, the source_schema saved the schema in the cluster
    optional TabletSchemaPB source_schema = 14;
    optional PersistentIndexSstableMetaPB sstable_meta = 15;
    optional DeltaColumnGroupMetadataPB dcg_meta = 16;
    // Keep the tablet schema before each Alter operation
    // If no rowset use the tablet schema any more, it will be gc by compaction
    // The latest schema is also saved here, and it is same with the above schema
    // It can be removed in future versions
    map<int64, TabletSchemaPB> historical_schemas = 17;
    // rowset_id -> schema_id
    map<uint32, int64> rowset_to_schema = 18;
    // global transaction id
    optional int64 gtid = 19 [default=0];
    // compaction strategy
    optional CompactionStrategyPB compaction_strategy = 20;
    // flat json
    optional FlatJsonConfigPB flat_json_config = 21;
    // Indicates sort key range for range distribution table only
    optional TabletRangePB range = 22;
    // Watermark for async vector index build: all rowsets with end_version <= this value
    // have their .vi files fully built. Carry-forwarded during publish.
    optional int64 vector_index_built_version = 23;
    // Per-segment index delta groups produced by ADD INDEX schema change
    // (lake-only). Allows adding indexes without rewriting segment data.
    optional IndexDeltaGroupMetadataPB idg_meta = 24;
}

message MetadataUpdateInfoPB {
    // enable persistent index in primary key table
    optional bool enable_persistent_index = 1;
    optional TabletSchemaPB tablet_schema = 2;
    optional PersistentIndexTypePB persistent_index_type = 3;
    optional bool bundle_tablet_metadata = 4;
    optional CompactionStrategyPB compaction_strategy = 5;
    optional FlatJsonConfigPB flat_json_config = 6;
}

message BundleTabletMetadataPB {
    map<int64, int64> tablet_to_schema = 1; // tablet id -> schema id
    map<int64, TabletSchemaPB> schemas = 2;
    map<int64, PagePointerPB> tablet_meta_pages = 3;
}

message TxnLogPB {

    message OpWrite {
        optional RowsetMetadataPB rowset = 1;
        // some txn semantic information bind to this rowset
        optional RowsetTxnMetaPB txn_meta = 2;
        // DEPRECATED: superseded by dels_meta[].name. Dual-written for rollback.
        repeated string deprecated_dels = 3 [json_name = "dels"];
        // DEPRECATED: superseded by rewrite_segments_meta[].name. Dual-written for rollback.
        // for partial update, record dest rewrite segment names to avoid gc
        repeated string deprecated_rewrite_segments = 4 [json_name = "rewrite_segments"];
        // DEPRECATED: superseded by dels_meta[].encryption_meta. Dual-written for rollback.
        repeated bytes deprecated_del_encryption_metas = 5 [json_name = "del_encryption_metas"];
        repeated FileMetaPB ssts = 6;
        repeated PersistentIndexSstableRangePB sst_ranges = 7;
        // The specific table schema used to generate this rowset
        optional TableSchemaKeyPB schema_key = 8;
        // DEPRECATED: superseded by dels_meta[].shared. Dual-written for rollback.
        // Parallel to `dels`: whether each del file is shared across tablets.
        // Populated during tablet split cross-publish so that the del files keep
        // their shared flag when written into RowsetMetadataPB.del_files. Empty
        // (default) means all dels are private.
        repeated bool deprecated_shared_dels = 9 [json_name = "shared_dels"];
        // Canonical per-del-file metadata (name / size / shared / encryption_meta),
        // superseding deprecated_dels / deprecated_del_encryption_metas / deprecated_shared_dels.
        repeated FileMetaPB dels_meta = 19;
        // Canonical per-rewrite-segment metadata, superseding deprecated_rewrite_segments.
        repeated FileMetaPB rewrite_segments_meta = 20;
    }

    message OpCompaction {
        repeated uint32 input_rowsets = 1;
        optional RowsetMetadataPB output_rowset = 2;
        repeated PersistentIndexSstablePB input_sstables = 3;
        optional PersistentIndexSstablePB output_sstable = 4;
        // Base version of compaction task, used for conflict check with partial update
        optional int64 compact_version = 5;
        // For normal compaction, all segments in `output_rowset` will be new segments.
        // For partial compaction, we put compacted segments and uncompacted segments
        // together, and when compaction is aborted, we need to avoid uncompacted segments
        // being deleted.
        // e.g., a b x y e f, in `output_rowset`, a,b,e,f might be uncompacted segments,
        // x and y might be new segments
        optional int32 new_segment_offset = 6;
        optional int32 new_segment_count = 7;
        repeated FileMetaPB ssts = 8;
        repeated PersistentIndexSstableRangePB sst_ranges = 9;
        // Pk index compaction may generate multi sstables in latest impl.
        repeated PersistentIndexSstablePB output_sstables = 10;
        // Lake Compaction Rows Mapper file metadata (.lcrm on remote storage)
        // WHY: Store mapper file metadata in txn log to enable light publish optimization
        // during parallel pk index execution. The file maps input rowset rows to output
        // rowset rows, allowing quick conflict resolution without re-reading all data.
        // DESIGN: FileMetaPB includes both name and size to avoid expensive get_size()
        // calls to S3/HDFS during publish phase (~10-50ms saved per file access).
        optional FileMetaPB lcrm_file = 11;
        // Subtask ID for parallel compaction. Only set when this OpCompaction is part of
        // OpParallelCompaction. For normal compaction, this field is not set.
        optional int32 subtask_id = 12;
        // Segment range for large rowset split compaction.
        // When a large rowset is split into multiple subtasks, each subtask processes
        // a range of segments [segment_range_start, segment_range_end).
        // Only set for LARGE_ROWSET_PART type subtasks.
        optional int32 segment_range_start = 13;
        optional int32 segment_range_end = 14;
        // For RANGE_SPLIT type: the sort key range this subtask processed.
        // All subtask ranges are non-overlapping, so merged output is non-overlapping.
        optional TuplePB range_split_lower_bound = 15;
        optional TuplePB range_split_upper_bound = 16;
        optional bool range_split_lower_inclusive = 17;
        optional bool range_split_upper_inclusive = 18;
    }

    // Parallel compaction operation: contains multiple subtask compaction results.
    // Each subtask generates an independent OpCompaction that can be processed using
    // the standard publish_primary_compaction logic.
    message OpParallelCompaction {
        // Each successful subtask's standard OpCompaction.
        // Contains input_rowsets, output_rowset, and lcrm_file for each subtask.
        // SST compaction fields (input_sstables/output_sstable) should be empty in subtask OpCompactions.
        repeated OpCompaction subtask_compactions = 1;
        // List of successful subtask IDs for tracking.
        repeated int32 success_subtask_ids = 2;
        // Unified SST compaction results (executed once after all subtasks complete).
        repeated PersistentIndexSstablePB input_sstables = 3;
        optional PersistentIndexSstablePB output_sstable = 4;
        // Pk index compaction may generate multi sstables in latest impl.
        repeated PersistentIndexSstablePB output_sstables = 5;
        // Orphan lcrm files to be cleaned up during publish.
        // When large rowset split subtasks are merged, their individual lcrm_files
        // are no longer valid (segment IDs change after merge) and must be cleaned.
        repeated FileMetaPB orphan_lcrm_files = 6;
        // Whether this parallel compaction uses range-split strategy.
        // When true, the merged output rowset is non-overlapping.
        optional bool is_range_split = 7;
    }

    message OpSchemaChange {
        repeated RowsetMetadataPB rowsets = 1;
        // Whether segment files are linked to new tablet's segment files.
        // If it's false, the segment files can be deleted on aborting,
        // otherwise cannot delete them.
        optional bool linked_segment = 2;
        // The data <= |alter_version| is generated by schema change,
        // and the rowsets are saved in txn_log.
        // The data between |alter_version + 1| and |new_version - 1| in publish version request is generated by load,
        // and the rowsets are saved in vtxn_log.
        optional int64 alter_version = 3;
        // delete vector
        optional DelvecMetadataPB delvec_meta = 4;
    }

    message OpAlterMetadata {
        // alter tablet meta op
        repeated MetadataUpdateInfoPB metadata_update_infos = 1;
    }

    message OpReplication {
        optional ReplicationTxnMetaPB txn_meta = 1;
        repeated OpWrite op_writes = 2;
        map<uint32, DelvecDataPB> delvecs = 3;
        optional TabletSchemaPB source_schema = 4;
        // used for shared-data replication to store the tablet meta replicated
        optional TabletMetadataPB tablet_metadata = 5;
        // delta column group metadata for partial update and generated column replication
        optional DeltaColumnGroupMetadataPB dcg_meta = 6;
    }

    // Produced by ADD INDEX fast-path schema change (lake-only). Carries
    // the per-segment IDG entries built during the alter; publish commits
    // them into TabletMetadataPB.idg_meta.
    message OpAddIndex {
        message SegmentEntry {
            optional uint32 segment_id = 1;
            optional IndexDeltaGroupEntryPB entry = 2;
        }
        repeated SegmentEntry segment_entries = 1;
        optional int64 alter_version = 2;
        // Indexes added by this alter; redundant w.r.t. schema.table_indices
        // that FE has already published, kept for idempotent reconciliation.
        repeated TabletIndexPB new_indexes = 3;
    }

    // Produced by DROP INDEX fast-path schema change (lake-only). Applied
    // as a logical tombstone: on publish, matching (col_unique_id,
    // index_type) entries in IDG get their keys moved to dropped_keys.
    // Physical cleanup happens at compaction time.
    message OpDropIndex {
        message DroppedIndex {
            optional int64 index_id = 1;
            optional int32 col_unique_id = 2;
            optional IndexType index_type = 3;
        }
        repeated DroppedIndex dropped = 1;
        optional int64 drop_version = 2;
    }

    // SDCG lightweight overlay-chain merge (minor compaction): collapse a base segment's deep sparse
    // overlay chain into ONE packed `.spcols`, WITHOUT reading the base segment and WITHOUT a rows
    // mapper (the base rowset is untouched, so source_rowid coordinates stay valid). Emitted by the CN
    // in place of OpCompaction when a scheduled compaction's input is a convergence-only deep-chain
    // rowset; applied by orphaning the merged layers and appending the merged packed layer to the same
    // rssid's DCG. Bounds read amplification off the publish critical path. (lake-only)
    message OpDcgCompaction {
        // Snapshot version the merge read at (mirrors OpCompaction.compact_version). A DCG layer whose
        // version > compact_version raced the merge: it is NOT dropped (kept on top of the merged layer),
        // so the merge never discards concurrent writes -- it just leaves the chain at depth 2.
        optional int64 compact_version = 1;
        message Entry {
            // Base segment (rssid) whose overlay layers are merged.
            optional uint32 rssid = 1;
            // The merged packed `.spcols` (its DCG entry's file_kind == SPARSE_PERCOL).
            optional FileMetaPB merged_file = 2;
            // Update column uids the merged file carries (NOT the reserved source_rowid uid).
            repeated uint32 column_uids = 3;
            // File-level presence summary [min,max]+K of the merged file.
            optional SparsePresencePB presence = 4;
            // Per-column exact covered-rowid presence (roaring) for the packed merged file.
            optional ColumnPresenceListPB column_presence = 5;
            // Base segment row count M (fingerprint guard for the merged overlay).
            optional int64 source_segment_num_rows = 6;
            // Versions of the DCG layers folded into this merged file. At apply, layers on |rssid| whose
            // version is in this set are orphaned + removed; higher-version layers (concurrent writes that
            // raced the merge) are preserved on top.
            repeated int64 merged_versions = 7;
        }
        repeated Entry entries = 2;
    }

    optional int64 tablet_id = 1;
    optional int64 txn_id = 2;
    optional OpWrite op_write = 3;
    optional OpCompaction op_compaction = 4;
    optional OpSchemaChange op_schema_change = 5;
    optional OpAlterMetadata op_alter_metadata = 6;
    optional OpReplication op_replication = 7;
    optional int64 partition_id = 8;
    optional PUniqueId load_id = 9;
    optional OpParallelCompaction op_parallel_compaction = 10;
    // ADD INDEX fast-path op (lake-only).
    optional OpAddIndex op_add_index = 11;
    // DROP INDEX fast-path op (lake-only).
    optional OpDropIndex op_drop_index = 12;
    // SDCG overlay-chain merge op (lake-only); see OpDcgCompaction.
    optional OpDcgCompaction op_dcg_compaction = 13;
}

message CombinedTxnLogPB {
    repeated TxnLogPB txn_logs = 1;    
}

message TabletMetadataLockPB {}

message TxnInfoPB {
    optional int64 txn_id = 1;
    optional int64 commit_time = 2;
    // Does the transaction generated a combined txn log
    optional bool combined_txn_log = 3;
    optional TxnTypePB txn_type = 4;
    optional bool force_publish = 5; // only used for compaction
    optional bool rebuild_pindex = 6;
    optional int64 gtid = 7 [default=0];
    repeated PUniqueId load_ids = 8;
    // Placeholder for external cluster snapshot feature.
    optional bool restore_force_publish = 9; // Txn from snapshot restore, publish directly succeed
    optional int64 restore_gtid = 10;
    // Number of leading sort-key columns that participate in the table's range
    // colocate group. Only used by tablet split (TXN_TABLET_RESHARD with split
    // direction). 0 (default) = legacy / non-colocate-aware split. BE uses this
    // to prefer canonical colocate-prefix boundaries over within-prefix data-
    // distribution candidates; FE classifies the resulting tablet ranges as
    // Level 1 (new ColocateRange) vs Level 2 (intra-colocate).
    // Carried at the txn level (not per SplittingTabletInfoPB) because the value
    // is table-level metadata: every SplittingTabletInfoPB in one txn would
    // carry the same value.
    optional int32 colocate_column_count = 11;
    // Admin-issued no-op publish flag. When true, BE bypasses txn-log loading and
    // apply for this transaction; the publish loop still writes a new tablet
    // metadata file (so partition visible version advances) but it carries no
    // data contribution from this txn. Used by ADMIN ABORT COMMITTED TRANSACTION
    // to unblock a stuck-publish transaction. Only meaningful for load/compaction
    // txn types in the current implementation; alter is not supported yet.
    optional bool no_op_publish = 12;
}

message SplittingTabletInfoPB {
    optional int64 old_tablet_id = 1;
    repeated int64 new_tablet_ids = 2;
    // FE-supplied new-tablet ranges (external-boundaries path).
    // When non-empty:
    //   - BE skips data-driven boundary computation in `split_tablet` and
    //     dispatches to `compute_split_ranges_from_external_boundaries`
    //     instead, which honors these ranges verbatim.
    //   - Size MUST equal new_tablet_ids.size.
    //   - Ranges MUST cover the old tablet's range exactly with no gaps/overlaps.
    //   - Each range uses [lower, upper) (upper_bound_included=false).
    // Upgrade ordering policy: BE is upgraded before FE, so any FE that
    // populates this field is guaranteed to be talking to BEs that consume
    // it; no separate capability flag is needed.
    repeated TabletRangePB new_tablet_ranges = 3;
}

message MergingTabletInfoPB {
    repeated int64 old_tablet_ids = 1;
    optional int64 new_tablet_id = 2;
}

message IdenticalTabletInfoPB {
    optional int64 old_tablet_id = 1;
    optional int64 new_tablet_id = 2;
}

message ReshardingTabletInfoPB {
    optional SplittingTabletInfoPB splitting_tablet_info = 1;
    optional MergingTabletInfoPB merging_tablet_info = 2;
    optional IdenticalTabletInfoPB identical_tablet_info = 3;
}

// Placeholder for external cluster snapshot feature.
message ExternalClusterSnapshotLogPB {
    optional int64 job_id = 1;
    optional int64 db_id = 2;
    optional int64 table_id = 3;
    optional int64 partition_id = 4;
    optional int64 physical_partition_id = 5;
    repeated string delete_data_files = 6;
    repeated string delete_meta_files = 7;
    repeated string delete_schema_files = 8;
}
