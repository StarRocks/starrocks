version: '3.8'

services:
  # StarRocks with OpenSearch Connector
  starrocks:
    build:
      context: .
      dockerfile: docker/Dockerfile.opensearch
    container_name: starrocks-opensearch
    hostname: starrocks
    ports:
      - "9030:9030"  # MySQL protocol
      - "8080:8080"  # HTTP / Stream Load
    environment:
      - MYSQL_ROOT_PASSWORD=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - sr-os-network

  # OpenSearch 2.9.x for testing
  opensearch:
    image: opensearchproject/opensearch:2.9.0
    container_name: opensearch-test
    hostname: opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - sr-os-network

  # OpenSearch Dashboards (optional)
  dashboards:
    image: opensearchproject/opensearch-dashboards:2.9.0
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - sr-os-network

networks:
  sr-os-network:
    driver: bridge
